<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Essentix daily news digest cover</title>
  <desc id="desc">Branded cover graphic for Essentix, an AI-powered daily news summary service.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b1e"/>
      <stop offset="55%" stop-color="#183a74"/>
      <stop offset="100%" stop-color="#255fbe"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f1e8" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#dff4ee" stop-opacity="0.96"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" rx="40"/>
  <circle cx="1320" cy="130" r="180" fill="#60a5fa" fill-opacity="0.18"/>
  <circle cx="180" cy="780" r="220" fill="#f2c879" fill-opacity="0.10"/>
  <rect x="110" y="120" width="760" height="660" rx="34" fill="url(#card)"/>
  <rect x="920" y="165" width="560" height="120" rx="28" fill="#eff6ff" fill-opacity="0.14" stroke="#93c5fd" stroke-opacity="0.34"/>
  <rect x="920" y="320" width="560" height="120" rx="28" fill="#eff6ff" fill-opacity="0.14" stroke="#93c5fd" stroke-opacity="0.34"/>
  <rect x="920" y="475" width="560" height="120" rx="28" fill="#eff6ff" fill-opacity="0.14" stroke="#93c5fd" stroke-opacity="0.34"/>
  <rect x="920" y="630" width="560" height="120" rx="28" fill="#eff6ff" fill-opacity="0.14" stroke="#93c5fd" stroke-opacity="0.34"/>
  <text x="170" y="250" font-family="'Space Grotesk', Arial, sans-serif" font-size="92" font-weight="700" fill="#0f2629">Essentix</text>
  <text x="170" y="330" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="38" fill="#355055">Only the essential news,</text>
  <text x="170" y="380" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="38" fill="#355055">summarized for your topics.</text>
  <text x="170" y="485" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="26" font-weight="700" fill="#0ca678">Daily curated digest</text>
  <text x="170" y="535" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" fill="#233a3d">Trusted US news portals, reduced noise,</text>
  <text x="170" y="578" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" fill="#233a3d">custom topics, and direct source links.</text>
  <text x="170" y="680" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24" fill="#4b6a6e">Politics  Technology  AI  Robotics  Science  Custom Topics</text>
  <text x="975" y="235" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="600" fill="#f5fbf8">Morning digest</text>
  <text x="975" y="390" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="600" fill="#f5fbf8">Topic-based summaries</text>
  <text x="975" y="545" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="600" fill="#f5fbf8">Custom keyword tracking</text>
  <text x="975" y="700" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="600" fill="#f5fbf8">Direct links to sources</text>
</svg>
